<html>
<head>
    <meta http-equiv="Content-Type" content="text/html; charset=gb18030">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">

    <title>Reporte de Venta de Tarjetas</title>
    <style>
        body {
            font-family: Montserrat, sans-serif;
        }
        .login-block {
            width: 320px;
            padding: 20px;
            background: #fff;
            border-radius: 5px;
            border-top: 7px solid #0040FF;
            margin: 50px auto;
        }
        .login-block h3 {
            text-align: center;
            color: #0040FF;
            font-size: 18px;
            text-transform: uppercase;
            margin-bottom: 18px;
        }
        .login-block input, .login-block select {
            width: 100%;
            height: 34px;
            margin-bottom: 20px;
            border-radius: 5px;
            border: 1px solid #ccc;
            padding: 0 10px;
        }
        #login {
            width: 100%;
            height: 40px;
            background: #0040FF;
            border: 1px solid #0040FF;
            color: #fff;
            font-weight: bold;
            text-transform: uppercase;
            font-size: 14px;
            cursor: pointer;
        }
    </style>
</head>

<body>
<div class="login-block">
    <form name="consulta_reporte" method="GET" action="https://videoaccesos.net/reporte_personal_privadas.php" target="_blank">
        <h3>Reporte de Venta de Tarjetas</h3>
        
        <label for="fechaInicial">Fecha Inicial:</label>
        <input type="date" id="fechaInicial" name="periodo" required>

        <label for="fechaFinal">Fecha Final:</label>
        <input type="date" id="fechaFinal" name="periodo_final" required>

        <label for="cmbPrivadas">Privada:</label>
        <select name="privada" id="cmbPrivadas" required>
            <option value="0">Todas las Privadas</option>
            <!-- Opciones de privadas dinámicas irían aquí -->
        </select>

        <label for="exportar">¿Exportar a CSV?</label>
        <select name="download" id="exportar" required>
            <option value="0">Ver en pantalla</option>
            <option value="1">Exportar a CSV</option>
        </select>

        <input id="login" type="submit" value="Generar Reporte">
    </form>
</div>
</body>
</html>
